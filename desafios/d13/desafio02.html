<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Desafio 02</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
        }

        thead > tr {
            background-color: grey;
            color: white;
        }

        th, td {
            border: 1px solid black;
        }

</head>

            </tr>
        </thead>
        <tbody>

            </tr>
            <tr>

            </tr>
            <tr>
                <td>Química</td>
                <td>0.0</td>

            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr scope= "colgroup"style="background-color: grey; color: white;">
                <th colspan="4">Médias de Exatas</th>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope= "rowgroup"rowspan="2">Humanas</th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr scope="row" style="background-color: grey; color: white;">
                <th colspan="4">Média de Humanas</th>
                <td>0.0</td>
            </tr>
        </tbody>
    </table>

</html>
