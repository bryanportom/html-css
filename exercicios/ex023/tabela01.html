<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinando tabelas grandes</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }

        table {
            font-family: 'Times New Roman', Times, serif;
            width: 500px;
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid black;
            text-align: center;
        }

        thead, tfoot {
            background-color: darkgrey;
            color: white;
        }

        tbody > tr:nth-child(odd) {
            background-color: yellow;
        }

        tbody > tr:nth-child(even) {
            background-color: blue;
        }

    </style>
</head>
<body>
    <h1>Treinando tabelas</h1>
    <table>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col">Pessoas</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td>20.000.000</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td>10.000.000</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td>15.000.000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total</th>
                <td>45.000.000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
